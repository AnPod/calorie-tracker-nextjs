<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        header .date {
            font-size: 0.875rem;
            opacity: 0.9;
            margin-top: 4px;
        }

        .section {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .section:last-child {
            border-bottom: none;
        }

        .section-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        /* Search */
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input[type="text"],
        input[type="number"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5a6fd6;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #fee;
            color: #c33;
        }

        .btn-danger:hover {
            background: #fcc;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.75rem;
        }

        /* Search results */
        .search-status {
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 8px;
            min-height: 20px;
        }

        .search-results {
            max-height: 300px;
            overflow-y: auto;
        }

        .food-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #fafafa;
        }

        .food-item:hover {
            background: #f0f0f0;
        }

        .food-info {
            flex: 1;
        }

        .food-name {
            font-weight: 500;
            color: #333;
        }

        .food-brand {
            font-size: 0.75rem;
            color: #888;
        }

        .food-calories {
            font-size: 0.875rem;
            color: #667eea;
            font-weight: 500;
        }

        .food-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Quick Add Dropdown */
        .quick-add-section {
            margin-bottom: 16px;
        }

        select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .modal-header h2 {
            font-size: 1.25rem;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #555;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Summary */
        .summary-bar {
            background: #f0f0f0;
            border-radius: 8px;
            height: 24px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .summary-progress {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }

        .summary-progress.over {
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
        }

        .summary-stats {
            display: flex;
            justify-content: space-between;
            text-align: center;
        }

        .stat {
            flex: 1;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
        }

        /* Logged foods */
        .logged-foods {
            margin-top: 16px;
        }

        .logged-food {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .logged-food:last-child {
            border-bottom: none;
        }

        .logged-food-info {
            flex: 1;
        }

        .logged-food-name {
            font-size: 0.875rem;
            color: #333;
        }

        .logged-food-details {
            font-size: 0.75rem;
            color: #888;
        }

        .logged-food-calories {
            font-size: 0.875rem;
            font-weight: 500;
            color: #667eea;
            margin-right: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 24px;
            color: #888;
            font-size: 0.875rem;
        }

        /* Weekly view */
        .weekly-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 120px;
            padding: 16px 0;
            gap: 8px;
        }

        .day-bar {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .bar {
            width: 100%;
            background: #667eea;
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            transition: height 0.3s ease;
        }

        .bar.over {
            background: #f5576c;
        }

        .bar-label {
            font-size: 0.75rem;
            color: #666;
        }

        .bar-value {
            font-size: 0.625rem;
            color: #888;
        }

        .weekly-summary {
            text-align: center;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        /* Saved meals */
        .saved-meal {
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .saved-meal-name {
            font-weight: 500;
        }

        .saved-meal-foods {
            font-size: 0.75rem;
            color: #888;
        }

        /* Utility */
        .hidden {
            display: none !important;
        }

        .error-message {
            color: #c33;
            font-size: 0.875rem;
            padding: 8px 12px;
            background: #fee;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .success-message {
            color: #2a5;
            font-size: 0.875rem;
            padding: 8px 12px;
            background: #efe;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        /* Toggle section */
        .toggle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 12px 0;
        }

        .toggle-header:hover {
            color: #667eea;
        }

        .toggle-content {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .toggle-content.collapsed {
            max-height: 0;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .container {
                border-radius: 0;
                min-height: 100vh;
            }

            .summary-stats {
                flex-wrap: wrap;
                gap: 12px;
            }

            .stat {
                min-width: 45%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Calorie Tracker</h1>
            <div class="date" id="currentDate"></div>
        </header>

        <!-- Messages -->
        <div id="messageArea"></div>

        <!-- Search Section -->
        <div class="section">
            <div class="section-title">Search Food</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search for food (e.g., banana, chicken)..." data-testid="search-input">
                <button class="btn-primary" id="searchBtn" data-testid="search-btn">Search</button>
            </div>
            <div class="search-status" id="searchStatus"></div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Quick Add Section -->
        <div class="section">
            <div class="section-title">Quick Add</div>
            <div class="quick-add-section">
                <select id="quickAddSelect">
                    <option value="">-- Select a saved meal --</option>
                </select>
            </div>
            <button class="btn-secondary btn-small" id="manageMealsBtn">Manage Saved Meals</button>
        </div>

        <!-- Custom Food Section -->
        <div class="section">
            <button class="btn-secondary" id="addCustomFoodBtn">+ Add Custom Food</button>
        </div>

        <!-- Today's Summary -->
        <div class="section">
            <div class="section-title">Today's Summary</div>
            <div class="summary-bar">
                <div class="summary-progress" id="summaryProgress" style="width: 0%"></div>
            </div>
            <div class="summary-stats">
                <div class="stat">
                    <div class="stat-value" id="totalCalories">0</div>
                    <div class="stat-label">Calories</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalProtein">0g</div>
                    <div class="stat-label">Protein</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalCarbs">0g</div>
                    <div class="stat-label">Carbs</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalFat">0g</div>
                    <div class="stat-label">Fat</div>
                </div>
            </div>

            <div class="logged-foods" id="loggedFoods">
                <div class="empty-state">No foods logged today</div>
            </div>

            <button class="btn-danger btn-small" id="clearDayBtn" style="margin-top: 16px; width: 100%;">Clear Today's Log</button>
        </div>

        <!-- Weekly View -->
        <div class="section">
            <div class="toggle-header" id="weeklyToggle">
                <div class="section-title" style="margin: 0;">Weekly View</div>
                <span id="weeklyToggleIcon">▼</span>
            </div>
            <div class="toggle-content" id="weeklyContent">
                <div class="weekly-summary">
                    <div>7-Day Average: <strong id="weeklyAverage">0</strong> calories</div>
                </div>
                <div class="weekly-chart" id="weeklyChart"></div>
            </div>
        </div>

        <!-- Data Export -->
        <div class="section">
            <div class="section-title">Data Backup</div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-secondary" id="exportBtn">Export Data</button>
                <button class="btn-secondary" id="importBtn">Import Data</button>
            </div>
            <input type="file" id="importFile" accept=".json" style="display: none;">
        </div>
    </div>

    <!-- Add Food Modal -->
    <div class="modal-overlay" id="addFoodModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add Food to Log</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Food</label>
                    <div id="modalFoodName" style="font-weight: 500;"></div>
                    <div id="modalFoodCalories" style="font-size: 0.875rem; color: #666;"></div>
                </div>
                <div class="form-group">
                    <label for="gramsInput">Amount (grams)</label>
                    <input type="number" id="gramsInput" placeholder="100" min="1" data-testid="grams-input">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelAddBtn">Cancel</button>
                <button class="btn-primary" id="confirmAddBtn" data-testid="confirm-add">Add to Log</button>
            </div>
        </div>
    </div>

    <!-- Custom Food Modal -->
    <div class="modal-overlay" id="customFoodModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Add Custom Food</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="customFoodName">Food Name *</label>
                    <input type="text" id="customFoodName" placeholder="e.g., Mom's Pancakes">
                </div>
                <div class="form-group">
                    <label for="customFoodCalories">Calories per 100g *</label>
                    <input type="number" id="customFoodCalories" placeholder="250" min="0">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="customFoodProtein">Protein (g)</label>
                        <input type="number" id="customFoodProtein" placeholder="0" min="0" step="0.1">
                    </div>
                    <div class="form-group">
                        <label for="customFoodCarbs">Carbs (g)</label>
                        <input type="number" id="customFoodCarbs" placeholder="0" min="0" step="0.1">
                    </div>
                </div>
                <div class="form-group">
                    <label for="customFoodFat">Fat (g)</label>
                    <input type="number" id="customFoodFat" placeholder="0" min="0" step="0.1">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelCustomBtn">Cancel</button>
                <button class="btn-primary" id="saveCustomBtn">Save Food</button>
            </div>
        </div>
    </div>

    <!-- Save Meal Modal -->
    <div class="modal-overlay" id="saveMealModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Save as Meal</h2>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 16px; font-size: 0.875rem; color: #666;">
                    Save today's logged foods as a reusable meal template.
                </p>
                <div class="form-group">
                    <label for="mealNameInput">Meal Name *</label>
                    <input type="text" id="mealNameInput" placeholder="e.g., My Breakfast">
                </div>
                <div id="mealPreview" style="font-size: 0.875rem; color: #666;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelSaveMealBtn">Cancel</button>
                <button class="btn-primary" id="confirmSaveMealBtn">Save Meal</button>
            </div>
        </div>
    </div>

    <!-- Manage Meals Modal -->
    <div class="modal-overlay" id="manageMealsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Manage Saved Meals</h2>
            </div>
            <div class="modal-body">
                <button class="btn-secondary btn-small" id="createMealFromTodayBtn" style="margin-bottom: 16px; width: 100%;">
                    + Save Today's Foods as Meal
                </button>
                <div id="savedMealsList"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="closeManageMealsBtn">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Global App Namespace
        const App = {
            Storage: {},
            Search: {},
            Log: {},
            Meals: {},
            Weekly: {},
            Export: {},
            UI: {}
        };

        // Constants
        const CACHE_TTL = 5 * 60 * 1000; // 5 minutes
        const RATE_LIMIT_DELAY = 6000; // 6 seconds between searches (10/min max)
        const DEFAULT_DAILY_GOAL = 2000;

        // In-memory search cache
        const searchCache = new Map();

        // Current state
        let currentSearchResults = [];
        let selectedFood = null;
        let lastSearchTime = 0;

        // UUID generator
        function generateId() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Get today's date key
        function getTodayKey() {
            return new Date().toISOString().split('T')[0];
        }

        // ==================== STORAGE ====================

        App.Storage.getData = function() {
            try {
                const data = localStorage.getItem('calorieTrackerData');
                if (data) {
                    return JSON.parse(data);
                }
            } catch (e) {
                console.error('Error reading from localStorage:', e);
            }
            return {
                dailyLog: {},
                dateIndex: [],
                customFoods: [],
                savedMeals: [],
                settings: { dailyCalorieGoal: DEFAULT_DAILY_GOAL }
            };
        };

        App.Storage.saveData = function(data) {
            try {
                localStorage.setItem('calorieTrackerData', JSON.stringify(data));
                return true;
            } catch (e) {
                if (e.name === 'QuotaExceededError') {
                    App.UI.showError('Storage full. Export your data to clear space.');
                } else {
                    App.UI.showError('Failed to save data. Please try again.');
                }
                console.error('Error saving to localStorage:', e);
                return false;
            }
        };

        App.Storage.getDayLog = function(dateKey) {
            const data = App.Storage.getData();
            return data.dailyLog[dateKey] || [];
        };

        App.Storage.addToDayLog = function(dateKey, foodEntry) {
            const data = App.Storage.getData();
            if (!data.dailyLog[dateKey]) {
                data.dailyLog[dateKey] = [];
            }
            data.dailyLog[dateKey].push(foodEntry);

            // Update date index
            if (!data.dateIndex.includes(dateKey)) {
                data.dateIndex.push(dateKey);
                data.dateIndex.sort().reverse();
            }

            return App.Storage.saveData(data);
        };

        App.Storage.removeFromDayLog = function(dateKey, entryId) {
            const data = App.Storage.getData();
            if (data.dailyLog[dateKey]) {
                data.dailyLog[dateKey] = data.dailyLog[dateKey].filter(e => e.id !== entryId);
                return App.Storage.saveData(data);
            }
            return false;
        };

        App.Storage.clearDayLog = function(dateKey) {
            const data = App.Storage.getData();
            if (data.dailyLog[dateKey]) {
                delete data.dailyLog[dateKey];

                // Update date index
                data.dateIndex = data.dateIndex.filter(d => d !== dateKey);

                return App.Storage.saveData(data);
            }
            return false;
        };

        App.Storage.addCustomFood = function(food) {
            const data = App.Storage.getData();
            food.id = generateId();
            food.isCustom = true;
            food.createdAt = new Date().toISOString();
            data.customFoods.push(food);
            return App.Storage.saveData(data);
        };

        App.Storage.deleteCustomFood = function(foodId) {
            const data = App.Storage.getData();
            data.customFoods = data.customFoods.filter(f => f.id !== foodId);
            return App.Storage.saveData(data);
        };

        App.Storage.addSavedMeal = function(meal) {
            const data = App.Storage.getData();
            meal.id = generateId();
            data.savedMeals.push(meal);
            return App.Storage.saveData(data);
        };

        App.Storage.deleteSavedMeal = function(mealId) {
            const data = App.Storage.getData();
            data.savedMeals = data.savedMeals.filter(m => m.id !== mealId);
            return App.Storage.saveData(data);
        };

        // ==================== SEARCH ====================

        App.Search.getCached = function(query) {
            const cached = searchCache.get(query);
            if (cached && Date.now() - cached.timestamp < CACHE_TTL) {
                return cached.results;
            }
            return null;
        };

        App.Search.setCached = function(query, results) {
            searchCache.set(query, {
                results: results,
                timestamp: Date.now()
            });
        };

        App.Search.search = async function(query) {
            if (!query || query.trim().length < 2) {
                return { error: 'Please enter at least 2 characters to search.' };
            }

            query = query.trim().toLowerCase();

            // Check cache first
            const cached = App.Search.getCached(query);
            if (cached) {
                return { results: cached };
            }

            // Rate limiting
            const now = Date.now();
            const timeSinceLastSearch = now - lastSearchTime;
            if (timeSinceLastSearch < RATE_LIMIT_DELAY) {
                const waitTime = Math.ceil((RATE_LIMIT_DELAY - timeSinceLastSearch) / 1000);
                return { error: `Please wait ${waitTime} seconds before searching again.` };
            }

            lastSearchTime = now;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);

                const response = await fetch(
                    `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&json=1&page_size=10`,
                    {
                        headers: {
                            'User-Agent': 'CalorieTracker/1.0 (calorie-tracker@example.com)'
                        },
                        signal: controller.signal
                    }
                );

                clearTimeout(timeoutId);

                if (response.status === 429) {
                    return { error: 'Searching too fast. Please wait a moment.' };
                }

                if (!response.ok) {
                    return { error: 'Failed to fetch results. Please try again.' };
                }

                const data = await response.json();
                const results = App.Search.parseResults(data.products || []);

                // Merge with custom foods
                const allData = App.Storage.getData();
                const matchingCustomFoods = allData.customFoods.filter(f =>
                    f.name.toLowerCase().includes(query)
                );

                const combinedResults = [...matchingCustomFoods, ...results];

                // Cache results
                App.Search.setCached(query, combinedResults);

                return { results: combinedResults };

            } catch (error) {
                if (error.name === 'AbortError') {
                    return { error: 'Search timed out. Please try again.' };
                }
                console.error('Search error:', error);
                return { error: "Can't connect to food database. Check your internet." };
            }
        };

        App.Search.parseResults = function(products) {
            return products.map(product => {
                const nutriments = product.nutriments || {};

                // Get calories - prefer kcal, convert kJ if needed
                let caloriesPer100g = nutriments['energy-kcal_100g'];
                if (!caloriesPer100g && nutriments['energy_100g']) {
                    // Convert kJ to kcal
                    caloriesPer100g = nutriments['energy_100g'] / 4.184;
                }

                return {
                    id: product.code || generateId(),
                    name: product.product_name || 'Unknown Product',
                    brand: product.brands || '',
                    caloriesPer100g: Math.round(caloriesPer100g || 0),
                    proteinPer100g: nutriments.proteins_100g || 0,
                    carbsPer100g: nutriments.carbohydrates_100g || 0,
                    fatPer100g: nutriments.fat_100g || 0,
                    isCustom: false
                };
            }).filter(p => p.caloriesPer100g > 0 || p.name !== 'Unknown Product');
        };

        // ==================== LOG ====================

        App.Log.addEntry = function(food, grams) {
            const entry = {
                id: generateId(),
                name: food.name,
                brand: food.brand || '',
                grams: grams,
                caloriesPer100g: food.caloriesPer100g,
                proteinPer100g: food.proteinPer100g || 0,
                carbsPer100g: food.carbsPer100g || 0,
                fatPer100g: food.fatPer100g || 0,
                isCustom: food.isCustom || false
            };

            const today = getTodayKey();
            return App.Storage.addToDayLog(today, entry);
        };

        App.Log.removeEntry = function(entryId) {
            const today = getTodayKey();
            return App.Storage.removeFromDayLog(today, entryId);
        };

        App.Log.clearToday = function() {
            const today = getTodayKey();
            return App.Storage.clearDayLog(today);
        };

        App.Log.getTodayStats = function() {
            const today = getTodayKey();
            const entries = App.Storage.getDayLog(today);

            return entries.reduce((stats, entry) => {
                const ratio = entry.grams / 100;
                stats.calories += Math.round(entry.caloriesPer100g * ratio);
                stats.protein += Math.round(entry.proteinPer100g * ratio);
                stats.carbs += Math.round(entry.carbsPer100g * ratio);
                stats.fat += Math.round(entry.fatPer100g * ratio);
                return stats;
            }, { calories: 0, protein: 0, carbs: 0, fat: 0, entries: entries });
        };

        // ==================== MEALS ====================

        App.Meals.getAll = function() {
            return App.Storage.getData().savedMeals;
        };

        App.Meals.saveFromToday = function(name) {
            const today = getTodayKey();
            const entries = App.Storage.getDayLog(today);

            if (entries.length === 0) {
                return { error: 'No foods logged today to save as meal.' };
            }

            const meal = {
                name: name,
                foods: entries.map(e => ({
                    name: e.name,
                    grams: e.grams,
                    caloriesPer100g: e.caloriesPer100g,
                    proteinPer100g: e.proteinPer100g,
                    carbsPer100g: e.carbsPer100g,
                    fatPer100g: e.fatPer100g
                }))
            };

            App.Storage.addSavedMeal(meal);
            return { success: true };
        };

        App.Meals.addToToday = function(mealId) {
            const data = App.Storage.getData();
            const meal = data.savedMeals.find(m => m.id === mealId);

            if (!meal) {
                return { error: 'Meal not found.' };
            }

            const today = getTodayKey();
            meal.foods.forEach(food => {
                const entry = {
                    id: generateId(),
                    name: food.name,
                    brand: '',
                    grams: food.grams,
                    caloriesPer100g: food.caloriesPer100g,
                    proteinPer100g: food.proteinPer100g || 0,
                    carbsPer100g: food.carbsPer100g || 0,
                    fatPer100g: food.fatPer100g || 0,
                    isCustom: false
                };
                App.Storage.addToDayLog(today, entry);
            });

            return { success: true, count: meal.foods.length };
        };

        App.Meals.delete = function(mealId) {
            return App.Storage.deleteSavedMeal(mealId);
        };

        // ==================== WEEKLY ====================

        App.Weekly.getSummary = function() {
            const data = App.Storage.getData();
            const today = new Date();
            const days = [];

            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateKey = date.toISOString().split('T')[0];
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });

                const entries = data.dailyLog[dateKey] || [];
                const calories = entries.reduce((sum, entry) => {
                    return sum + Math.round(entry.caloriesPer100g * (entry.grams / 100));
                }, 0);

                days.push({
                    date: dateKey,
                    dayName: dayName,
                    calories: calories,
                    hasData: entries.length > 0
                });
            }

            const avgCalories = Math.round(
                days.reduce((sum, d) => sum + d.calories, 0) / 7
            );

            return { days, average: avgCalories };
        };

        // ==================== EXPORT/IMPORT ====================

        App.Export.exportData = function() {
            const data = App.Storage.getData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `calorie-tracker-backup-${getTodayKey()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        App.Export.importData = function(file) {
            return new Promise((resolve, reject) => {
                if (file.size > 10 * 1024 * 1024) {
                    reject(new Error('File too large. Max size is 10MB.'));
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);

                        // Validate required fields
                        if (!data.dailyLog || !Array.isArray(data.customFoods) || !Array.isArray(data.savedMeals)) {
                            reject(new Error('File is missing required data.'));
                            return;
                        }

                        // Confirm with user
                        if (confirm('This will replace all current data. Continue?')) {
                            App.Storage.saveData(data);
                            resolve();
                        } else {
                            reject(new Error('Import cancelled.'));
                        }
                    } catch (error) {
                        reject(new Error('File is not valid JSON.'));
                    }
                };
                reader.onerror = () => reject(new Error('Failed to read file.'));
                reader.readAsText(file);
            });
        };

        // ==================== UI ====================

        App.UI.init = function() {
            // Set current date
            const dateEl = document.getElementById('currentDate');
            dateEl.textContent = new Date().toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            // Bind events
            App.UI.bindEvents();

            // Initial render
            App.UI.renderSummary();
            App.UI.renderLoggedFoods();
            App.UI.renderQuickAddOptions();
            App.UI.renderWeeklyView();
        };

        App.UI.bindEvents = function() {
            // Search
            document.getElementById('searchBtn').addEventListener('click', App.UI.handleSearch);
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') App.UI.handleSearch();
            });

            // Quick add
            document.getElementById('quickAddSelect').addEventListener('change', App.UI.handleQuickAdd);

            // Manage meals
            document.getElementById('manageMealsBtn').addEventListener('click', () => {
                App.UI.renderSavedMealsList();
                App.UI.showModal('manageMealsModal');
            });

            // Custom food
            document.getElementById('addCustomFoodBtn').addEventListener('click', () => {
                App.UI.showModal('customFoodModal');
            });

            // Clear day
            document.getElementById('clearDayBtn').addEventListener('click', () => {
                if (confirm('Clear all foods logged today?')) {
                    App.Log.clearToday();
                    App.UI.renderSummary();
                    App.UI.renderLoggedFoods();
                    App.UI.showSuccess('Today\'s log cleared.');
                }
            });

            // Weekly toggle
            document.getElementById('weeklyToggle').addEventListener('click', () => {
                const content = document.getElementById('weeklyContent');
                const icon = document.getElementById('weeklyToggleIcon');
                content.classList.toggle('collapsed');
                icon.textContent = content.classList.contains('collapsed') ? '▶' : '▼';
            });

            // Export/Import
            document.getElementById('exportBtn').addEventListener('click', App.Export.exportData);
            document.getElementById('importBtn').addEventListener('click', () => {
                document.getElementById('importFile').click();
            });
            document.getElementById('importFile').addEventListener('change', App.UI.handleImport);

            // Modal: Add Food
            document.getElementById('cancelAddBtn').addEventListener('click', () => {
                App.UI.hideModal('addFoodModal');
            });
            document.getElementById('confirmAddBtn').addEventListener('click', App.UI.confirmAddFood);

            // Modal: Custom Food
            document.getElementById('cancelCustomBtn').addEventListener('click', () => {
                App.UI.hideModal('customFoodModal');
            });
            document.getElementById('saveCustomBtn').addEventListener('click', App.UI.saveCustomFood);

            // Modal: Save Meal
            document.getElementById('cancelSaveMealBtn').addEventListener('click', () => {
                App.UI.hideModal('saveMealModal');
            });
            document.getElementById('confirmSaveMealBtn').addEventListener('click', App.UI.confirmSaveMeal);

            // Modal: Manage Meals
            document.getElementById('closeManageMealsBtn').addEventListener('click', () => {
                App.UI.hideModal('manageMealsModal');
            });
            document.getElementById('createMealFromTodayBtn').addEventListener('click', () => {
                const todayLog = App.Storage.getDayLog(getTodayKey());
                if (todayLog.length === 0) {
                    App.UI.showError('No foods logged today to save as meal.');
                    return;
                }
                App.UI.hideModal('manageMealsModal');
                App.UI.showSaveMealModal();
            });

            // Close modals on overlay click
            document.querySelectorAll('.modal-overlay').forEach(overlay => {
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.classList.remove('active');
                    }
                });
            });
        };

        App.UI.handleSearch = async function() {
            const input = document.getElementById('searchInput');
            const status = document.getElementById('searchStatus');
            const results = document.getElementById('searchResults');
            const btn = document.getElementById('searchBtn');

            const query = input.value.trim();
            if (!query) return;

            btn.disabled = true;
            status.textContent = 'Searching...';
            results.innerHTML = '';

            const response = await App.Search.search(query);

            btn.disabled = false;

            if (response.error) {
                status.textContent = response.error;
                return;
            }

            currentSearchResults = response.results;

            if (response.results.length === 0) {
                status.textContent = 'No foods found. Try a different search or add a custom food.';
                return;
            }

            status.textContent = `Found ${response.results.length} results:`;
            App.UI.renderSearchResults(response.results);
        };

        App.UI.renderSearchResults = function(results) {
            const container = document.getElementById('searchResults');
            container.innerHTML = '';

            results.forEach((food, index) => {
                const el = document.createElement('div');
                el.className = 'food-item';
                el.setAttribute('data-testid', 'search-result');
                el.innerHTML = `
                    <div class="food-info">
                        <div class="food-name">${App.UI.escapeHtml(food.name)}</div>
                        ${food.brand ? `<div class="food-brand">${App.UI.escapeHtml(food.brand)}</div>` : ''}
                        <div class="food-calories">${food.caloriesPer100g} kcal per 100g</div>
                    </div>
                    <div class="food-actions">
                        <button class="btn-primary btn-small" data-testid="add-btn" data-index="${index}">+</button>
                    </div>
                `;
                container.appendChild(el);
            });

            // Bind add buttons
            container.querySelectorAll('button[data-index]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = parseInt(e.target.dataset.index);
                    selectedFood = results[index];
                    App.UI.showAddFoodModal(selectedFood);
                });
            });
        };

        App.UI.showAddFoodModal = function(food) {
            document.getElementById('modalFoodName').textContent = food.name;
            document.getElementById('modalFoodCalories').textContent =
                `${food.caloriesPer100g} kcal per 100g`;
            document.getElementById('gramsInput').value = '100';
            App.UI.showModal('addFoodModal');
        };

        App.UI.confirmAddFood = function() {
            const grams = parseInt(document.getElementById('gramsInput').value, 10);

            if (!grams || grams < 1) {
                App.UI.showError('Please enter a valid amount in grams.');
                return;
            }

            App.Log.addEntry(selectedFood, grams);
            App.UI.hideModal('addFoodModal');
            App.UI.renderSummary();
            App.UI.renderLoggedFoods();
            App.UI.renderWeeklyView();
            App.UI.showSuccess(`${selectedFood.name} added to log.`);
        };

        App.UI.saveCustomFood = function() {
            const name = document.getElementById('customFoodName').value.trim();
            const calories = parseInt(document.getElementById('customFoodCalories').value, 10);
            const protein = parseFloat(document.getElementById('customFoodProtein').value) || 0;
            const carbs = parseFloat(document.getElementById('customFoodCarbs').value) || 0;
            const fat = parseFloat(document.getElementById('customFoodFat').value) || 0;

            if (!name) {
                App.UI.showError('Please enter a food name.');
                return;
            }

            if (!calories || calories < 0) {
                App.UI.showError('Please enter valid calories per 100g.');
                return;
            }

            App.Storage.addCustomFood({
                name: name,
                caloriesPer100g: calories,
                proteinPer100g: protein,
                carbsPer100g: carbs,
                fatPer100g: fat
            });

            App.UI.hideModal('customFoodModal');
            App.UI.clearCustomFoodForm();
            App.UI.showSuccess(`"${name}" added to custom foods.`);
        };

        App.UI.clearCustomFoodForm = function() {
            document.getElementById('customFoodName').value = '';
            document.getElementById('customFoodCalories').value = '';
            document.getElementById('customFoodProtein').value = '';
            document.getElementById('customFoodCarbs').value = '';
            document.getElementById('customFoodFat').value = '';
        };

        App.UI.showSaveMealModal = function() {
            const todayLog = App.Storage.getDayLog(getTodayKey());
            const preview = todayLog.map(e => `${e.name} (${e.grams}g)`).join(', ');

            document.getElementById('mealPreview').textContent =
                `Foods to save: ${preview.substring(0, 100)}${preview.length > 100 ? '...' : ''}`;
            document.getElementById('mealNameInput').value = '';
            App.UI.showModal('saveMealModal');
        };

        App.UI.confirmSaveMeal = function() {
            const name = document.getElementById('mealNameInput').value.trim();

            if (!name) {
                App.UI.showError('Please enter a meal name.');
                return;
            }

            const result = App.Meals.saveFromToday(name);

            if (result.error) {
                App.UI.showError(result.error);
                return;
            }

            App.UI.hideModal('saveMealModal');
            App.UI.renderQuickAddOptions();
            App.UI.showSuccess(`"${name}" saved as a meal.`);
        };

        App.UI.handleQuickAdd = function(e) {
            const mealId = e.target.value;
            if (!mealId) return;

            const result = App.Meals.addToToday(mealId);

            if (result.error) {
                App.UI.showError(result.error);
                return;
            }

            e.target.value = '';
            App.UI.renderSummary();
            App.UI.renderLoggedFoods();
            App.UI.renderWeeklyView();
            App.UI.showSuccess(`Added ${result.count} foods from saved meal.`);
        };

        App.UI.renderQuickAddOptions = function() {
            const select = document.getElementById('quickAddSelect');
            const meals = App.Meals.getAll();

            select.innerHTML = '<option value="">-- Select a saved meal --</option>';

            meals.forEach(meal => {
                const option = document.createElement('option');
                option.value = meal.id;
                option.textContent = meal.name;
                select.appendChild(option);
            });
        };

        App.UI.renderSavedMealsList = function() {
            const container = document.getElementById('savedMealsList');
            const meals = App.Meals.getAll();

            if (meals.length === 0) {
                container.innerHTML = '<div class="empty-state">No saved meals yet</div>';
                return;
            }

            container.innerHTML = '';
            meals.forEach(meal => {
                const el = document.createElement('div');
                el.className = 'saved-meal';
                el.innerHTML = `
                    <div>
                        <div class="saved-meal-name">${App.UI.escapeHtml(meal.name)}</div>
                        <div class="saved-meal-foods">${meal.foods.length} foods</div>
                    </div>
                    <button class="btn-danger btn-small" data-meal-id="${meal.id}">Delete</button>
                `;
                container.appendChild(el);
            });

            // Bind delete buttons
            container.querySelectorAll('button[data-meal-id]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const mealId = e.target.dataset.mealId;
                    if (confirm('Delete this saved meal?')) {
                        App.Meals.delete(mealId);
                        App.UI.renderSavedMealsList();
                        App.UI.renderQuickAddOptions();
                    }
                });
            });
        };

        App.UI.renderSummary = function() {
            const stats = App.Log.getTodayStats();
            const data = App.Storage.getData();
            const goal = data.settings?.dailyCalorieGoal || DEFAULT_DAILY_GOAL;

            document.getElementById('totalCalories').textContent = stats.calories;
            document.getElementById('totalProtein').textContent = stats.protein + 'g';
            document.getElementById('totalCarbs').textContent = stats.carbs + 'g';
            document.getElementById('totalFat').textContent = stats.fat + 'g';

            const progress = Math.min((stats.calories / goal) * 100, 100);
            const progressEl = document.getElementById('summaryProgress');
            progressEl.style.width = progress + '%';
            progressEl.classList.toggle('over', stats.calories > goal);
        };

        App.UI.renderLoggedFoods = function() {
            const container = document.getElementById('loggedFoods');
            const today = getTodayKey();
            const entries = App.Storage.getDayLog(today);

            if (entries.length === 0) {
                container.innerHTML = '<div class="empty-state">No foods logged today</div>';
                return;
            }

            container.innerHTML = '';
            entries.forEach(entry => {
                const ratio = entry.grams / 100;
                const calories = Math.round(entry.caloriesPer100g * ratio);

                const el = document.createElement('div');
                el.className = 'logged-food';
                el.innerHTML = `
                    <div class="logged-food-info">
                        <div class="logged-food-name">${App.UI.escapeHtml(entry.name)}</div>
                        <div class="logged-food-details">${entry.grams}g</div>
                    </div>
                    <div class="logged-food-calories">${calories} cal</div>
                    <button class="btn-danger btn-small" data-entry-id="${entry.id}">×</button>
                `;
                container.appendChild(el);
            });

            // Bind remove buttons
            container.querySelectorAll('button[data-entry-id]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const entryId = e.target.dataset.entryId;
                    App.Log.removeEntry(entryId);
                    App.UI.renderSummary();
                    App.UI.renderLoggedFoods();
                    App.UI.renderWeeklyView();
                });
            });
        };

        App.UI.renderWeeklyView = function() {
            const summary = App.Weekly.getSummary();
            const data = App.Storage.getData();
            const goal = data.settings?.dailyCalorieGoal || DEFAULT_DAILY_GOAL;

            document.getElementById('weeklyAverage').textContent = summary.average;

            const chart = document.getElementById('weeklyChart');
            chart.innerHTML = '';

            const maxCalories = Math.max(...summary.days.map(d => d.calories), goal);

            summary.days.forEach(day => {
                const heightPercent = maxCalories > 0 ? (day.calories / maxCalories) * 100 : 0;
                const isOver = day.calories > goal;

                const dayEl = document.createElement('div');
                dayEl.className = 'day-bar';
                dayEl.innerHTML = `
                    <div class="bar-value">${day.calories > 0 ? day.calories : ''}</div>
                    <div class="bar ${isOver ? 'over' : ''}" style="height: ${Math.max(heightPercent, 4)}%"></div>
                    <div class="bar-label">${day.dayName}</div>
                `;
                chart.appendChild(dayEl);
            });
        };

        App.UI.handleImport = async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            try {
                await App.Export.importData(file);
                App.UI.renderSummary();
                App.UI.renderLoggedFoods();
                App.UI.renderQuickAddOptions();
                App.UI.renderWeeklyView();
                App.UI.showSuccess('Data imported successfully.');
            } catch (error) {
                App.UI.showError(error.message);
            }

            e.target.value = '';
        };

        App.UI.showModal = function(modalId) {
            document.getElementById(modalId).classList.add('active');
        };

        App.UI.hideModal = function(modalId) {
            document.getElementById(modalId).classList.remove('active');
        };

        App.UI.showError = function(message) {
            const area = document.getElementById('messageArea');
            const el = document.createElement('div');
            el.className = 'error-message';
            el.textContent = message;
            area.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        };

        App.UI.showSuccess = function(message) {
            const area = document.getElementById('messageArea');
            const el = document.createElement('div');
            el.className = 'success-message';
            el.textContent = message;
            area.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        };

        App.UI.escapeHtml = function(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        };

        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', App.UI.init);
    </script>
</body>
</html>
